name: CI/CD Pipeline

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: HeyNaNd0/aks-ai-agent
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -r requirements.txt
          pip install -e .

      - name: Run Ruff linter
        run: ruff check agent/ tests/

      - name: Run unit tests
        run: pytest tests/ -v

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Deploy skipped — set DEPLOY_ENABLED=true in repo variables to enable deployment
        if: ${{ vars.DEPLOY_ENABLED != 'true' }}
        run: echo "Deploy skipped — set DEPLOY_ENABLED=true in repo variables to enable deployment"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group my-aks-rg \
            --name my-aks-cluster \
            --overwrite-existing

      - name: Create namespace if not exists
        run: |
          kubectl get namespace aks-agent || kubectl create namespace aks-agent

      - name: Apply RBAC
        run: kubectl apply -f k8s/rbac.yaml

      - name: Create / update Kubernetes secrets
        run: |
          kubectl create secret generic aks-agent-secrets \
            --namespace aks-agent \
            --from-literal=ANTHROPIC_API_KEY="$(echo -n '${{ secrets.ANTHROPIC_API_KEY }}' | tr -d '[:space:]')" \
            --from-literal=AZURE_SUBSCRIPTION_ID="$(echo -n '${{ secrets.AZURE_SUBSCRIPTION_ID }}' | tr -d '[:space:]')" \
            --from-literal=AZURE_TENANT_ID="$(echo -n '${{ secrets.AZURE_TENANT_ID }}' | tr -d '[:space:]')" \
            --from-literal=AZURE_CLIENT_ID="$(echo -n '${{ secrets.AZURE_CLIENT_ID }}' | tr -d '[:space:]')" \
            --from-literal=AZURE_CLIENT_SECRET="$(echo -n '${{ secrets.AZURE_CLIENT_SECRET }}' | tr -d '[:space:]')" \
            --from-literal=ADMIN_EMAIL_PASSWORD="$(echo -n '${{ secrets.ADMIN_EMAIL_PASSWORD }}' | tr -d '[:space:]')" \
            --from-literal=GITHUB_TOKEN="$(echo -n '${{ secrets.GITHUB_TOKEN }}' | tr -d '[:space:]')" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply ConfigMap
        run: kubectl apply -f k8s/secret.yaml

      - name: Inject image tag and deploy
        run: |
          IMAGE_TAG=$(echo "${{ needs.build.outputs.image-tag }}" | head -n1)
          sed -i "s|ghcr.io/YOUR_GITHUB_USERNAME/aks-ai-agent:latest|${IMAGE_TAG}|g" \
            k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/aks-ai-agent \
            --namespace aks-agent \
            --timeout=300s
