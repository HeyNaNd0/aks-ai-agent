apiVersion: v1
kind: Secret
metadata:
  name: aks-agent-secrets
  namespace: aks-agent
  labels:
    app.kubernetes.io/name: aks-ai-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: aks-ai-agent-{{ .Chart.Version }}
type: Opaque
data:
  ANTHROPIC_API_KEY: {{ .Values.anthropic.apiKey | b64enc }}
  AZURE_SUBSCRIPTION_ID: {{ .Values.cluster.subscriptionId | b64enc }}
  AZURE_TENANT_ID: {{ .Values.azure.tenantId | b64enc }}
  AZURE_CLIENT_ID: {{ .Values.azure.clientId | b64enc }}
  AZURE_CLIENT_SECRET: {{ .Values.azure.clientSecret | b64enc }}
  ADMIN_EMAIL_PASSWORD: {{ .Values.notifications.smtpPassword | b64enc }}
  GITHUB_TOKEN: {{ .Values.github.token | b64enc }}
