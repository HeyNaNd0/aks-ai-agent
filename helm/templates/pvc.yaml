apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aks-agent-db
  namespace: aks-agent
  labels:
    app.kubernetes.io/name: aks-ai-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: aks-ai-agent-{{ .Chart.Version }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storage.storageClass }}
  resources:
    requests:
      storage: {{ .Values.storage.size }}
