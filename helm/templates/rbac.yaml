---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aks-ai-agent-role
  labels:
    app.kubernetes.io/name: aks-ai-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: aks-ai-agent-{{ .Chart.Version }}
rules:
  # Read-only: core cluster resources
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - events
      - persistentvolumes
      - persistentvolumeclaims
      - resourcequotas
      - pods
      - pods/log
      - pods/status
      - services
      - endpoints
      - configmaps
      - serviceaccounts
    verbs: ["get", "list", "watch"]

  # Read + patch: deployments, replicasets, statefulsets, daemonsets
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch", "patch", "update"]

  # Read-only: horizontal pod autoscalers
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]

  # Write: delete crash-looping pods
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["delete"]

  # Write: cordon nodes (patch unschedulable)
  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["patch", "update"]

  # Read-only: networking
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]

  # Read-only: cert-manager (optional, harmless if CRD absent)
  - apiGroups: ["cert-manager.io"]
    resources:
      - certificates
      - certificaterequests
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aks-ai-agent-binding
  labels:
    app.kubernetes.io/name: aks-ai-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: aks-ai-agent-{{ .Chart.Version }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aks-ai-agent-role
subjects:
  - kind: ServiceAccount
    name: aks-ai-agent
    namespace: aks-agent
