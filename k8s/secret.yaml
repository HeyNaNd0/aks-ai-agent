# ============================================================
# AKS AI Agent — Kubernetes Secrets (TEMPLATE)
# ============================================================
# DO NOT commit this file with real values.
# Fill in the base64-encoded values below, or better yet:
# use the setup script: ./scripts/create-secrets.sh
#
# To base64-encode a value:
#   echo -n "your-secret-value" | base64
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: aks-agent-secrets
  namespace: aks-agent
type: Opaque
data:
  # echo -n "sk-ant-api03-..." | base64
  ANTHROPIC_API_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE

  # echo -n "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" | base64
  AZURE_SUBSCRIPTION_ID: REPLACE_WITH_BASE64_ENCODED_VALUE
  AZURE_TENANT_ID: REPLACE_WITH_BASE64_ENCODED_VALUE
  AZURE_CLIENT_ID: REPLACE_WITH_BASE64_ENCODED_VALUE
  AZURE_CLIENT_SECRET: REPLACE_WITH_BASE64_ENCODED_VALUE

  # echo -n "your-app-password" | base64
  ADMIN_EMAIL_PASSWORD: REPLACE_WITH_BASE64_ENCODED_VALUE

  # echo -n "ghp_xxxxxxxxxxxxxxxxxxxx" | base64
  GITHUB_TOKEN: REPLACE_WITH_BASE64_ENCODED_VALUE

---
# ============================================================
# ConfigMap — non-secret configuration
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: aks-agent-config
  namespace: aks-agent
data:
  config.yaml: |
    cluster:
      name: "my-aks-cluster"
      resource_group: "my-rg"
    monitoring:
      interval_seconds: 300
      namespaces:
        - default
        - kube-system
        - production
        - staging
    thresholds:
      cpu_percent: 85.0
      memory_percent: 85.0
      pod_restart_count: 5
      node_not_ready_seconds: 120
    azure:
      support_plan: "Developer"
    ai:
      model: "claude-opus-4-6"
      max_tokens: 4096
    notifications:
      admin_email: "admin@yourcompany.com"
      sender_email: "aks-agent@yourcompany.com"
      smtp_host: "smtp.gmail.com"
      smtp_port: 587
    github:
      issues_repo: "Azure/AKS"
      tracking_repo: "your-org/aks-issues"
    database:
      path: "data/issues.db"
