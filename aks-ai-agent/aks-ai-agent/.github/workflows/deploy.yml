# ============================================================
# AKS AI Agent — CI/CD Pipeline
# GitHub Actions Workflow
# ============================================================
# Triggers:
#   - push to main: build, test, push image, deploy to AKS
#   - pull requests: build and test only (no deploy)
#   - manual: workflow_dispatch for on-demand deploys
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   ANTHROPIC_API_KEY
#   AZURE_SUBSCRIPTION_ID
#   AZURE_TENANT_ID
#   AZURE_CLIENT_ID
#   AZURE_CLIENT_SECRET
#   ADMIN_EMAIL_PASSWORD
#   GITHUB_TOKEN  (auto-provided by Actions)
#   AKS_CLUSTER_NAME
#   AKS_RESOURCE_GROUP
# ============================================================

name: Build, Test & Deploy AKS Agent

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - 'config/**'
      - 'k8s/**'
      - 'Dockerfile'
      - 'requirements.txt'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/aks-ai-agent
  PYTHON_VERSION: "3.12"

jobs:
  # ────────────────────────────────────────────────────────
  # Job 1: Lint & Test
  # ────────────────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff mypy

      - name: Lint with ruff
        run: ruff check agent/ --select E,W,F --ignore E501

      - name: Type check with mypy
        run: mypy agent/ --ignore-missing-imports --no-strict-optional

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=agent --cov-report=xml
        env:
          # Dummy values so config.py doesn't fail on import
          ANTHROPIC_API_KEY: "test-key"
          AZURE_SUBSCRIPTION_ID: "00000000-0000-0000-0000-000000000000"
          AZURE_TENANT_ID: "00000000-0000-0000-0000-000000000000"
          AZURE_CLIENT_ID: "00000000-0000-0000-0000-000000000000"
          AZURE_CLIENT_SECRET: "test-secret"
          ADMIN_EMAIL_PASSWORD: "test-password"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────────
  # Job 2: Build & Push Docker Image
  # ────────────────────────────────────────────────────────
  build:
    name: Build & Push Container Image
    needs: test
    runs-on: ubuntu-latest
    # Only push on main branch, not PRs
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write  # Required to push to GitHub Container Registry

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Summarize build
        run: |
          echo "### 🐳 Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────
  # Job 3: Deploy to AKS
  # ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Get AKS credentials (kubeconfig)
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Create agent namespace (idempotent)
        run: |
          kubectl create namespace aks-agent --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply RBAC
        run: kubectl apply -f k8s/rbac.yaml

      - name: Create/update Kubernetes secrets
        run: |
          kubectl create secret generic aks-agent-secrets \
            --namespace aks-agent \
            --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --from-literal=AZURE_SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --from-literal=AZURE_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}" \
            --from-literal=AZURE_CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}" \
            --from-literal=AZURE_CLIENT_SECRET="${{ secrets.AZURE_CLIENT_SECRET }}" \
            --from-literal=ADMIN_EMAIL_PASSWORD="${{ secrets.ADMIN_EMAIL_PASSWORD }}" \
            --from-literal=GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply ConfigMap and Deployment
        run: |
          kubectl apply -f k8s/secret.yaml   # ConfigMap only (secrets already applied above)
          # Inject the actual image tag built in the previous job
          sed -i "s|ghcr.io/YOUR_GITHUB_USERNAME/aks-ai-agent:latest|${{ needs.build.outputs.image-tag }}|g" \
            k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/aks-ai-agent \
            --namespace aks-agent \
            --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n aks-agent -l app=aks-ai-agent
          echo "### ✅ AKS Agent Deployed" >> $GITHUB_STEP_SUMMARY
          echo "**Namespace:** aks-agent" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ needs.build.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────
  # Job 4: Notify on failure
  # ────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Deploy Failure
    needs: [test, build, deploy]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Create failure summary
        run: |
          echo "## ❌ AKS Agent Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the failed job above for details." >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
